<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenHuman Engine — GPU Dual-Quaternion Skinning Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0e10;
      color: #e8e8e8;
      font-family: system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px 20px;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
      border-bottom: 1px solid #333;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    header span.badge {
      font-size: 0.7rem;
      background: #1e6f3f;
      padding: 2px 8px;
      border-radius: 99px;
    }

    #canvas-wrapper {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    canvas:active { cursor: grabbing; }

    #hud {
      position: absolute;
      top: 12px;
      right: 14px;
      background: rgba(0,0,0,0.5);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.75rem;
      color: #aaa;
      pointer-events: none;
      line-height: 1.8;
    }

    #fps { color: #6ef08a; font-weight: 600; }
    #anim-state { color: #7ec8f8; }

    #controls {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }

    button {
      background: rgba(40, 80, 160, 0.85);
      border: 1px solid #4a8adf;
      color: #ddeeff;
      font-size: 0.8rem;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: rgba(60, 110, 200, 0.9); }

    #controls-hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.45);
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 0.7rem;
      color: #888;
      pointer-events: none;
      white-space: nowrap;
    }

    #error-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      color: #f88;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      padding: 24px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>OpenHuman Engine</h1>
  <span class="badge">WebGL 2.0</span>
  <span class="badge" style="background:#2c4a8c;">Zero deps</span>
  <span class="badge" style="background:#5a2c8c;">GPU DQ Skinning</span>
</header>

<div id="canvas-wrapper">
  <canvas id="gl-canvas"></canvas>

  <div id="hud">
    <div>FPS: <span id="fps">—</span></div>
    <div>State: <span id="anim-state">—</span></div>
    <div id="renderer-info">Initialising…</div>
  </div>

  <div id="controls">
    <button id="btn-idle">▶ Idle</button>
    <button id="btn-talk">💬 Talk</button>
  </div>

  <div id="controls-hint">
    🖱 Drag to orbit &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Touch supported
  </div>

  <div id="error-overlay">
    <div id="error-msg"></div>
  </div>
</div>

<script type="module">
/**
 * Animation Demo — GPU Dual-Quaternion Skinning
 *
 * Builds a procedural segmented cylinder with 3 joints and a 2-bone rig.
 * Demonstrates:
 *   - Skeleton construction with joint hierarchy
 *   - AnimationClip with LINEAR interpolation
 *   - AnimationGraph idle→talk transition (crossfade)
 *   - GPUSkinning texture upload
 *   - Skinned vertex shader (DQ blend on GPU)
 */
import {
  OpenHuman,
  GLContext, StateCache, ForwardRenderer,
  Camera, Light, Character, Node,
  VertexBuffer, IndexBuffer,
  Skeleton, Joint,
  AnimationClip, Pose,
  AnimationGraph,
  GPUSkinning,
} from '../src/sdk/OpenHuman.js';

const canvas  = document.getElementById('gl-canvas');
const fpsEl   = document.getElementById('fps');
const infoEl  = document.getElementById('renderer-info');
const stateEl = document.getElementById('anim-state');

function showError(msg) {
  const overlay = document.getElementById('error-overlay');
  document.getElementById('error-msg').textContent = msg;
  overlay.style.display = 'flex';
  console.error('[demo]', msg);
}

// ─────────────────────────────────────────────────────────────────
// 1. Build a skinned cylinder mesh (3 joints, 2 bones)
//    The cylinder is oriented along Y, split into 3 segments.
//    Joint 0 (root): base at Y=0
//    Joint 1 (mid) : at Y=1
//    Joint 2 (tip) : at Y=2
// ─────────────────────────────────────────────────────────────────
function buildSkinnedCylinder(gl) {
  const RADIUS  = 0.18;
  const HEIGHT  = 2.0;
  const SEGS    = 24;    // radial segments
  const VSTACKS = 12;    // vertical segments

  const positions = [];
  const normals   = [];
  const uvs       = [];
  const joints    = [];
  const weights   = [];
  const indices   = [];

  // Generate rings bottom → top
  for (let vi = 0; vi <= VSTACKS; vi++) {
    const y = (vi / VSTACKS) * HEIGHT;
    // Map Y to joint weights:
    //   y in [0,1)   → joint 0 dominant
    //   y in [0.8,1.4] → blend joints 0 and 1
    //   y in [1.0,2]   → joint 1 dominant
    //   y in [1.8,2]   → blend joints 1 and 2
    const t0 = y;           // 0→2
    const w0 = Math.max(0, 1.0 - Math.max(0, (t0 - 0.6) / 0.8));
    const w1Raw = 1.0 - Math.abs(t0 - 1.0) / 1.0;
    const w1 = Math.max(0, Math.min(1, w1Raw));
    const w2 = Math.max(0, 1.0 - Math.max(0, (2.0 - t0 - 0.6) / 0.8));
    // Normalise
    const wSum = w0 + w1 + w2 + 1e-6;
    const nw0 = w0 / wSum, nw1 = w1 / wSum, nw2 = w2 / wSum;

    for (let si = 0; si <= SEGS; si++) {
      const theta = (si / SEGS) * 2 * Math.PI;
      const nx = Math.cos(theta), nz = Math.sin(theta);
      positions.push(nx * RADIUS, y, nz * RADIUS);
      normals.push(nx, 0, nz);
      uvs.push(si / SEGS, vi / VSTACKS);
      joints.push(0, 1, 2, 0);   // up to 4 influences; indices
      weights.push(nw0, nw1, nw2, 0.0);
    }
  }

  // Triangles
  for (let vi = 0; vi < VSTACKS; vi++) {
    for (let si = 0; si < SEGS; si++) {
      const a = vi * (SEGS + 1) + si;
      const b = a + (SEGS + 1);
      indices.push(a, b, a + 1);
      indices.push(b, b + 1, a + 1);
    }
  }

  // Add top and bottom caps
  // Bottom cap center
  const botCenter = positions.length / 3;
  positions.push(0, 0, 0); normals.push(0, -1, 0); uvs.push(0.5, 0.5);
  joints.push(0, 1, 2, 0); weights.push(1, 0, 0, 0);
  for (let si = 0; si < SEGS; si++) {
    const a = si;
    const b = (si + 1) % SEGS;
    indices.push(botCenter, b, a);
  }

  // Top cap center
  const topCenterY = HEIGHT;
  const topCenter = positions.length / 3;
  positions.push(0, topCenterY, 0); normals.push(0, 1, 0); uvs.push(0.5, 0.5);
  joints.push(1, 2, 0, 0); weights.push(0, 1, 0, 0);
  const lastRingBase = VSTACKS * (SEGS + 1);
  for (let si = 0; si < SEGS; si++) {
    const a = lastRingBase + si;
    const b = lastRingBase + (si + 1) % SEGS;
    indices.push(topCenter, a, b);
  }

  const posArr = new Float32Array(positions);
  const nrmArr = new Float32Array(normals);
  const uvArr  = new Float32Array(uvs);
  const jArr   = new Float32Array(joints);
  const wArr   = new Float32Array(weights);
  const idxArr = new Uint16Array(indices);

  const vao = gl.createVertexArray();
  gl.bindVertexArray(vao);

  const upload = (data, loc, size) => {
    const buf = new VertexBuffer(gl, gl.STATIC_DRAW);
    buf.upload(data);
    gl.vertexAttribPointer(loc, size, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(loc);
    return buf;
  };

  const posBuf  = upload(posArr, 0, 3);
  const nrmBuf  = upload(nrmArr, 1, 3);
  const uvBuf   = upload(uvArr,  2, 2);
  const jBuf    = upload(jArr,   3, 4);
  const wBuf    = upload(wArr,   4, 4);

  const idxBuf = new IndexBuffer(gl, gl.STATIC_DRAW);
  idxBuf.upload(idxArr);

  gl.bindVertexArray(null);

  return {
    vao,
    vertexBuffers: { position: posBuf, normal: nrmBuf, texCoord0: uvBuf,
                     joints: jBuf, weights: wBuf },
    indexBuffer: idxBuf,
    indexCount:  idxArr.length,
    indexType:   gl.UNSIGNED_SHORT,
    skinned:     true,
    material: {
      baseColorFactor: [0.85, 0.55, 0.3, 1.0],
      roughnessFactor: 0.45,
      metallicFactor:  0.05,
    },
  };
}

// ─────────────────────────────────────────────────────────────────
// 2. Build skeleton (3 joints, parent-child chain)
// ─────────────────────────────────────────────────────────────────
function buildSkeleton() {
  // Joint local translations in bind pose
  const j0 = new Joint('root', 0, -1);   j0.localTranslation.set(0, 0, 0);
  const j1 = new Joint('mid',  1,  0);   j1.localTranslation.set(0, 1, 0);
  const j2 = new Joint('tip',  2,  1);   j2.localTranslation.set(0, 1, 0);

  const skel = new Skeleton([j0, j1, j2]);

  // Compute bind-pose world matrices so we can derive inverseBindMatrices
  skel.updateWorldMatrices();

  // inverseBindMatrix = inverse of worldMatrix in bind pose
  // Since worldMatrix = identity TRS for each joint in bind pose,
  // inverseBindMatrix is just the inverse of the bind-pose world transform.
  // We import Mat4 lazily here via the SDK re-export.
  for (const j of skel.joints) {
    // Mat4.invert is not re-exported directly — use inline inversion
    _mat4Invert(j.worldMatrix, j.inverseBindMatrix);
  }

  return skel;
}

// Inline Mat4 invert (same algorithm as Mat4.js to avoid import)
function _mat4Invert(src, dst) {
  const m = src.e, o = dst.e;
  const m00=m[0],m01=m[1],m02=m[2],m03=m[3];
  const m10=m[4],m11=m[5],m12=m[6],m13=m[7];
  const m20=m[8],m21=m[9],m22=m[10],m23=m[11];
  const m30=m[12],m31=m[13],m32=m[14],m33=m[15];
  const b00=m00*m11-m01*m10, b01=m00*m12-m02*m10;
  const b02=m00*m13-m03*m10, b03=m01*m12-m02*m11;
  const b04=m01*m13-m03*m11, b05=m02*m13-m03*m12;
  const b06=m20*m31-m21*m30, b07=m20*m32-m22*m30;
  const b08=m20*m33-m23*m30, b09=m21*m32-m22*m31;
  const b10=m21*m33-m23*m31, b11=m22*m33-m23*m32;
  let det=b00*b11-b01*b10+b02*b09+b03*b08-b04*b07+b05*b06;
  if (!det) return;
  det = 1/det;
  o[0]=(m11*b11-m12*b10+m13*b09)*det; o[1]=(m02*b10-m01*b11-m03*b09)*det;
  o[2]=(m31*b05-m32*b04+m33*b03)*det; o[3]=(m22*b04-m21*b05-m23*b03)*det;
  o[4]=(m12*b08-m10*b11-m13*b07)*det; o[5]=(m00*b11-m02*b08+m03*b07)*det;
  o[6]=(m32*b02-m30*b05-m33*b01)*det; o[7]=(m20*b05-m22*b02+m23*b01)*det;
  o[8]=(m10*b10-m11*b08+m13*b06)*det; o[9]=(m01*b08-m00*b10-m03*b06)*det;
  o[10]=(m30*b04-m31*b02+m33*b00)*det; o[11]=(m21*b02-m20*b04-m23*b00)*det;
  o[12]=(m11*b07-m10*b09-m12*b06)*det; o[13]=(m00*b09-m01*b07+m02*b06)*det;
  o[14]=(m31*b01-m30*b03-m32*b00)*det; o[15]=(m20*b03-m21*b01+m22*b00)*det;
}

// ─────────────────────────────────────────────────────────────────
// 3. Build animation clips
//    Idle: gentle sway of mid joint (Z-axis rotation)
//    Talk: more energetic nodding (mid + tip joints)
// ─────────────────────────────────────────────────────────────────
function makeRotationChannel(jointIdx, times, angles, axis) {
  // axis: 'x' | 'y' | 'z'
  // angles: array of radians for each keyframe
  const values = new Float32Array(times.length * 4);
  for (let i = 0; i < times.length; i++) {
    const half = angles[i] * 0.5;
    const s = Math.sin(half), c = Math.cos(half);
    const base = i * 4;
    values[base]     = axis === 'x' ? s : 0;
    values[base + 1] = axis === 'y' ? s : 0;
    values[base + 2] = axis === 'z' ? s : 0;
    values[base + 3] = c;
  }
  return {
    targetJointIndex: jointIdx,
    property:         'rotation',
    interpolation:    'LINEAR',
    times:            new Float32Array(times),
    values,
  };
}

function buildIdleClip() {
  // Mid joint sways ±15° around Z, period = 2 s
  const times  = [0, 0.5, 1.0, 1.5, 2.0];
  const angles = [0, 0.26, 0, -0.26, 0];   // radians ≈ ±15°
  return new AnimationClip('idle', 2.0, [
    makeRotationChannel(1, times, angles, 'z'),
  ]);
}

function buildTalkClip() {
  // Mid joint nods ±25° around Z, tip joint ±15° opposite
  const t   = [0, 0.25, 0.5, 0.75, 1.0];
  const mid = [0,  0.44, 0,  -0.44, 0];  // ±25°
  const tip = [0, -0.26, 0,   0.26, 0];  // ∓15°
  return new AnimationClip('talk', 1.0, [
    makeRotationChannel(1, t, mid, 'z'),
    makeRotationChannel(2, t, tip, 'z'),
  ]);
}

// ─────────────────────────────────────────────────────────────────
// 4. Main entry point
// ─────────────────────────────────────────────────────────────────
try {
  const glCtx   = new GLContext(canvas);
  const gl      = glCtx.gl;
  const cache   = new StateCache(gl);
  const renderer = new ForwardRenderer(glCtx, cache);

  const camera = new Camera({ fov: 50, aspect: canvas.clientWidth / (canvas.clientHeight || 1), near: 0.1, far: 100 });
  camera.setOrbit(0.2, Math.PI / 3.5, 3.5);
  camera.enableOrbit(canvas);

  const light = new Light('directional');
  light.direction.set(0.4, -0.8, 0.3);
  light.color.set(1, 0.95, 0.9);
  light.intensity = 1.2;

  // Build scene
  const skeleton  = buildSkeleton();
  const meshData  = buildSkinnedCylinder(gl);
  const gpuSkin   = new GPUSkinning(gl, skeleton.joints.length);

  // Offset the cylinder so the root is near the scene centre
  const charNode  = new Node('Character');
  const meshNode  = new Node('mesh');
  meshNode.mesh   = meshData;
  charNode.addChild(meshNode);
  // Centre the character around Y=1 (middle of the 2-unit cylinder)
  charNode.position.set(0, -1, 0);

  // Animation graph
  const idleClip = buildIdleClip();
  const talkClip = buildTalkClip();

  const graph = new AnimationGraph(skeleton);
  graph.addState('idle', idleClip);
  graph.addState('talk', talkClip);
  graph.addTransition('idle', 'talk', 'isTalking', 0.35, true);
  graph.addTransition('talk', 'idle', 'isTalking', 0.35, false);
  graph.play('idle');

  infoEl.textContent = 'WebGL 2.0 · GPU DQ Skinning · Forward Renderer';
  stateEl.textContent = 'idle';

  // ── Playback controls
  let currentAnim = 'idle';
  document.getElementById('btn-idle').addEventListener('click', () => {
    graph.setBool('isTalking', false);
    stateEl.textContent = 'idle (crossfading…)';
    setTimeout(() => { if (stateEl.textContent.startsWith('idle')) stateEl.textContent = 'idle'; }, 400);
    currentAnim = 'idle';
  });
  document.getElementById('btn-talk').addEventListener('click', () => {
    graph.setBool('isTalking', true);
    stateEl.textContent = 'talk (crossfading…)';
    setTimeout(() => { if (stateEl.textContent.startsWith('talk')) stateEl.textContent = 'talk'; }, 400);
    currentAnim = 'talk';
  });

  // ── Render loop
  let lastTs    = performance.now();
  let frameCount = 0;
  let lastFps    = performance.now();

  let autoOrbit = true, orbitTheta = 0.2;
  canvas.addEventListener('mousedown',  () => { autoOrbit = false; });
  canvas.addEventListener('touchstart', () => { autoOrbit = false; }, { passive: true });
  let idleTimer = null;
  const resetIdle = () => {
    autoOrbit = false;
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => { autoOrbit = true; }, 2500);
  };
  canvas.addEventListener('mouseup',  resetIdle);
  canvas.addEventListener('touchend', resetIdle);

  function frame(ts) {
    requestAnimationFrame(frame);

    // Resize
    const dpr = window.devicePixelRatio ?? 1;
    const dw  = Math.floor(canvas.clientWidth  * dpr);
    const dh  = Math.floor(canvas.clientHeight * dpr);
    if (canvas.width !== dw || canvas.height !== dh) {
      canvas.width  = dw; canvas.height = dh;
      camera.aspect = dw / (dh || 1);
      camera.updateProjection();
      renderer.resize(dw, dh);
    }

    const dt = Math.min((ts - lastTs) / 1000, 0.1);
    lastTs = ts;

    // Auto-orbit
    if (autoOrbit) {
      orbitTheta += dt * 0.4;
      camera.setOrbit(orbitTheta, Math.PI / 3.5, 3.5);
    }

    // Update animation graph → skeleton poses
    graph.update(dt);

    // Upload to GPU
    gpuSkin.update(skeleton);

    // Update scene graph world matrices
    charNode.updateWorldMatrix(null);

    // Draw — pass gpuSkin to renderer
    renderer.render(charNode.children, camera, [light], gpuSkin);

    // FPS
    frameCount++;
    if (ts - lastFps >= 500) {
      fpsEl.textContent = (frameCount / ((ts - lastFps) / 1000)).toFixed(0);
      frameCount = 0; lastFps = ts;
    }
  }
  requestAnimationFrame(frame);

} catch (err) {
  showError(err.message ?? String(err));
}
</script>
</body>
</html>
